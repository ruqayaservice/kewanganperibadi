<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aplikasi Kewangan Peribadi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#4f46e5,#9333ea);
min-height:100vh;
}

.card{
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

</style>

</head>

<body class="flex items-center justify-center p-6">

<div class="max-w-4xl w-full">

<h1 class="text-3xl text-white font-bold mb-6 text-center">
Aplikasi Kewangan Peribadi
</h1>

<!-- LOGIN -->

<div id="loginBox" class="card max-w-md mx-auto">

<h2 class="text-xl font-semibold mb-4 text-center">
Log Masuk
</h2>

<input id="username" placeholder="Username"
class="border p-3 w-full mb-3 rounded">

<input id="password" type="password" placeholder="Password"
class="border p-3 w-full mb-3 rounded">

<button onclick="login()"
class="bg-indigo-600 text-white w-full py-3 rounded hover:bg-indigo-700">

Log Masuk

</button>

<p id="loginError" class="text-red-500 mt-3 hidden text-center">
Login salah
</p>

</div>

<!-- APP -->

<div id="app" class="hidden">

<div class="grid md:grid-cols-3 gap-4 mb-6">

<div class="card text-center">
<p class="text-gray-500">Baki</p>
<p id="balance" class="text-2xl font-bold">RM0</p>
</div>

<div class="card text-center">
<p class="text-gray-500">Jumlah Masuk</p>
<p id="income" class="text-green-600 text-2xl font-bold">RM0</p>
</div>

<div class="card text-center">
<p class="text-gray-500">Jumlah Keluar</p>
<p id="expense" class="text-red-600 text-2xl font-bold">RM0</p>
</div>

</div>

<div class="grid md:grid-cols-2 gap-6">

<div class="card">

<h2 class="text-lg font-semibold mb-4">
Tambah Transaksi
</h2>

<select id="type" class="border p-2 w-full mb-3 rounded">
<option value="income">Masuk</option>
<option value="expense">Keluar</option>
</select>

<input id="amount" type="number" placeholder="Jumlah"
class="border p-2 w-full mb-3 rounded">

<input id="desc" placeholder="Penerangan"
class="border p-2 w-full mb-3 rounded">

<input id="date" type="date"
class="border p-2 w-full mb-3 rounded">

<button onclick="addTxn()"
class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">

Tambah

</button>

</div>

<div class="card">

<h2 class="text-lg font-semibold mb-4">
Senarai Transaksi
</h2>

<div id="list"></div>

</div>

</div>

</div>

</div>

<script>

const USER="saya"
const PASS="saya"

let transactions=[]

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

if(u===USER && p===PASS){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").classList.remove("hidden")

loadData()

}else{

document.getElementById("loginError").classList.remove("hidden")

}

}

function loadData(){

let data=localStorage.getItem("finance_data")

if(data){

transactions=JSON.parse(data)

}

render()

}

function saveData(){

localStorage.setItem("finance_data",JSON.stringify(transactions))

}

function addTxn(){

let type=document.getElementById("type").value
let amount=parseFloat(document.getElementById("amount").value)
let desc=document.getElementById("desc").value
let date=document.getElementById("date").value

if(!amount || !desc){

alert("Sila isi maklumat")

return

}

let txn={
id:Date.now(),
type,
amount,
desc,
date
}

transactions.push(txn)

saveData()

render()

}

function deleteTxn(id){

transactions=transactions.filter(t=>t.id!==id)

saveData()

render()

}

function render(){

let income=0
let expense=0

let list=document.getElementById("list")

list.innerHTML=""

transactions.forEach(t=>{

if(t.type==="income") income+=t.amount
else expense+=t.amount

let div=document.createElement("div")

div.className="border-b py-2 flex justify-between"

div.innerHTML=`

<div>

<p>${t.desc}</p>
<p class="text-sm text-gray-500">${t.date}</p>

</div>

<div>

<span class="${t.type==='income'?'text-green-600':'text-red-600'} font-semibold">

RM ${t.amount}

</span>

<button onclick="deleteTxn(${t.id})" class="text-red-500 ml-3">
Padam
</button>

</div>

`

list.appendChild(div)

})

document.getElementById("income").innerText="RM "+income.toFixed(2)
document.getElementById("expense").innerText="RM "+expense.toFixed(2)
document.getElementById("balance").innerText="RM "+(income-expense).toFixed(2)

}

</script>

</body>
</html>
