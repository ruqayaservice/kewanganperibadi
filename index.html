<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kewangan Peribadi</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.4/dist/tailwind.min.css" rel="stylesheet">

<style>

body{
font-family:sans-serif;
background:#0f172a;
color:white;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
}

</style>

</head>

<body class="p-6">

<h1 class="text-2xl font-bold mb-4">Kewangan Peribadi (Demo)</h1>

<!-- LOGIN -->

<div id="loginBox" class="card max-w-sm">

<input id="username" placeholder="username" class="text-black p-2 w-full mb-2">

<input id="password" type="password" placeholder="password" class="text-black p-2 w-full mb-2">

<button onclick="login()" class="bg-indigo-500 px-4 py-2 rounded">Log Masuk</button>

<p id="loginError" class="text-red-400 mt-2 hidden">Login salah</p>

</div>


<!-- APP -->

<div id="app" class="hidden">

<div class="grid grid-cols-3 gap-4 mb-6">

<div class="card">
<p>Baki</p>
<p id="balance">RM0</p>
</div>

<div class="card">
<p>Masuk</p>
<p id="income">RM0</p>
</div>

<div class="card">
<p>Keluar</p>
<p id="expense">RM0</p>
</div>

</div>


<div class="grid grid-cols-2 gap-6">

<div class="card">

<h2 class="mb-3">Tambah Transaksi</h2>

<select id="type" class="text-black p-2 w-full mb-2">
<option value="income">Masuk</option>
<option value="expense">Keluar</option>
</select>

<input id="amount" type="number" placeholder="Jumlah" class="text-black p-2 w-full mb-2">

<input id="desc" placeholder="Penerangan" class="text-black p-2 w-full mb-2">

<input id="date" type="date" class="text-black p-2 w-full mb-2">

<button onclick="addTxn()" class="bg-green-500 px-4 py-2 rounded">
Tambah
</button>

</div>



<div class="card">

<h2 class="mb-3">Senarai Transaksi</h2>

<div id="list"></div>

</div>

</div>

</div>


<script>

const USER="saya"
const PASS="saya"

let transactions=[]

function login(){

const u=document.getElementById("username").value
const p=document.getElementById("password").value

if(u===USER && p===PASS){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").classList.remove("hidden")

loadData()

}else{

document.getElementById("loginError").classList.remove("hidden")

}

}


function loadData(){

const data=localStorage.getItem("finance_data")

if(data){

transactions=JSON.parse(data)

}

render()

}


function saveData(){

localStorage.setItem("finance_data",JSON.stringify(transactions))

}


function addTxn(){

const type=document.getElementById("type").value
const amount=parseFloat(document.getElementById("amount").value)
const desc=document.getElementById("desc").value
const date=document.getElementById("date").value

if(!amount || !desc){

alert("Isi semua maklumat")

return

}

const txn={
id:Date.now(),
type,
amount,
desc,
date
}

transactions.push(txn)

saveData()

render()

}


function deleteTxn(id){

transactions=transactions.filter(t=>t.id!==id)

saveData()

render()

}


function render(){

let income=0
let expense=0

const list=document.getElementById("list")

list.innerHTML=""

transactions.forEach(t=>{

if(t.type==="income") income+=t.amount
else expense+=t.amount

const div=document.createElement("div")

div.className="border-b border-gray-700 p-2"

div.innerHTML=`

${t.date} | ${t.desc}

<span class="${t.type==='income'?'text-green-400':'text-red-400'}">

RM ${t.amount}

</span>

<button onclick="deleteTxn(${t.id})" class="ml-2 text-red-400">Padam</button>

`

list.appendChild(div)

})

document.getElementById("income").innerText="RM "+income.toFixed(2)

document.getElementById("expense").innerText="RM "+expense.toFixed(2)

document.getElementById("balance").innerText="RM "+(income-expense).toFixed(2)

}

</script>

</body>
</html>
